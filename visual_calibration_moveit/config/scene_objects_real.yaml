# INTERIM SAFETY PLACEHOLDER (2026-07-XX) — after a real-robot collision
# incident during manual jogging (RViz collision display was off), all four
# objects below are TEMPORARILY set to large, deliberately oversized generic
# boxes at rough estimated positions — NOT the sim-copied mesh values that
# were here before (those were wrong AND meshes, compounding the risk: wrong
# shape at a wrong position gives false confidence). The goal right now is
# "some real collision protection immediately," not precision — err toward
# boxes that are bigger/closer than reality, never smaller/further, so
# MoveIt treats more space as forbidden than is strictly necessary rather
# than less.
#
# TODO: replace each with an accurately measured box via the corner-jog
# workflow (measure_scene_box.py / measurecorner+measurecompute aliases —
# see resources/scripts/python/measure_scene_box.py) once that can be done
# safely (RViz collision-aware jogging, slow, one object at a time, another
# person spotting). Until then:
#   - Fill in YOUR_ESTIMATE_* placeholders below with a rough tape-measure/
#     eyeball distance from base_link to each object, then pad generously
#     (add margin, don't just guess the object's real edges).
#   - ALWAYS confirm "Collision-Aware" / collision display is enabled in
#     RViz's MotionPlanning panel before any further jogging near these
#     objects, regardless of how good these numbers are.
planning_scene_setup:
  ros__parameters:
    planning_frame: "base_link"

    # Per-object on/off switch — set any of these to false to remove that
    # object from the scene without deleting its config. All default true
    # if omitted.
    coffee_machine.enabled: true
    cupholder.enabled: true
    countertop.enabled: true
    wall.enabled: true
    camera.enabled: true

    # Coffee machine — rough box, padded. Fill in real rough distances.
    coffee_machine.shape_type: "box"
    coffee_machine.pose.x: 0.5
    coffee_machine.pose.y: 0.78
    coffee_machine.pose.z: -0.032
    coffee_machine.pose.yaw: 1.57
    coffee_machine.box_names: ["body"]
    coffee_machine.boxes.body.size: [0.6, 0.9, 0.8]
    coffee_machine.boxes.body.local_pose: [0.0, 0.0, 0.0, 0.0]

    # Barista cupholder/top — rough box, padded.
    cupholder.shape_type: "box"
    cupholder.pose.x: -0.26
    cupholder.pose.y: 0.04
    cupholder.pose.z: -0.832
    cupholder.pose.yaw: 1.57
    cupholder.box_names: ["body"]
    cupholder.boxes.body.size: [0.5, 0.5, 0.9]
    cupholder.boxes.body.local_pose: [0.0, 0.0, 0.0, 0.0]

    # Countertop/table surface — rough box, padded, tall enough to cover
    # from floor-ish up to table height as one solid block (simpler/safer
    # than 2 stacked boxes until precisely measured).
    countertop.shape_type: "box"
    countertop.pose.x: 0.42
    countertop.pose.y: 0.36
    countertop.pose.z: -0.601
    countertop.pose.yaw: 0.0
    countertop.box_names: ["body"]
    countertop.boxes.body.size: [1.0, 2.0, 1.2]
    countertop.boxes.body.local_pose: [0.0, 0.0, 0.0, 0.0]

    # Wall — rough box, padded thicker than sim's 0.03m (a thin wall is
    # easy to clip through in a rough estimate; err thick).
    wall.shape_type: "box"
    wall.pose.x: 0.3
    wall.pose.y: -0.50
    wall.pose.z: -0.032
    wall.pose.yaw: 0.0
    wall.box_names: ["body"]
    wall.boxes.body.size: [2.0, 0.3, 2.0]
    wall.boxes.body.local_pose: [0.0, 0.0, 0.0, 0.0]

    # Camera housing (D415, wall-mounted) — ROUGH PLACEHOLDER, not measured
    # (2026-07-20). The camera protrudes forward off the wall's front face
    # by some amount not yet measured — this box exists purely so the arm
    # doesn't clip it, not to model its true size/shape yet. wall's body is
    # centered at y=-0.56 with size_y=0.3, so its front face (facing the
    # room, +Y) is at y = -0.56 + 0.15 = -0.41 — this box's y is placed
    # just in front of that. z=0.3 is a guess at "above table height"
    # (countertop's own body top is roughly z=-0.601+1.2/2=-0.001) — pad
    # generously, same convention as every other object in this file. YOU
    # WILL MOVE THIS — update camera.pose.x/y/z (and size if needed) once
    # the camera's real mount point is measured, same
    # measurecorner/measurecompute workflow as the other objects.
    camera.shape_type: "box"
    camera.pose.x: -0.2
    camera.pose.y: -0.4
    camera.pose.z: 0.5
    camera.pose.yaw: 0.0
    camera.box_names: ["body"]
    camera.boxes.body.size: [0.8, 0.3, 0.3]
    camera.boxes.body.local_pose: [0.0, 0.0, 0.0, 0.0]