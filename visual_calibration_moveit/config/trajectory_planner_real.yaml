# camera_frame confirmed 2026-07-21 via `ros2 topic echo /D415/color/
# camera_info --once --field header.frame_id` -> "D415_color_optical_frame"
# (matches aruco_detector_real.yaml's image_topic/camera_info_topic, both
# under /D415/color/) — the real camera isn't arm-mounted, and its frame
# comes from the calibration pipeline itself, not a static URDF TF.
# standoff_m, max_reach_m, and facing_rpy_rad are still PLACEHOLDERs — not
# re-tuned/re-verified against the real cell yet — the real camera's
# mounting orientation may not match sim's, so facing_rpy_rad (the rule for
# how end_effector_frame should face camera_frame) may need a different
# rotation. Re-derive and verify visually (e.g. via tf_debug_markers.py)
# rather than assuming the sim value carries over.
# planning_mode (cartesian vs joint_space) is set per call-site, not here —
# see calibration_broadcaster_real.yaml, calibration_orchestrator_real.yaml,
# and polygon_default_planning_mode below; planner_id/planning_time_s/
# num_planning_attempts (which OMPL planner, and how hard it tries) is the
# only planning config that lives centrally, right here.
trajectory_planner:
  ros__parameters:
    camera_frame: "D415_color_optical_frame"
    # robotiq_85_base_link, NOT rg2_gripper_aruco_link (real's gripper
    # swapped RG2 -> Robotiq 85, see project_universal_robot_ros2_instructor_update
    # memory) and NOT aruco_link either — investigated 2026-07-17: aruco_link
    # is a genuine live TF frame on the real robot, but its only known
    # source was an ad-hoc, manually-started
    # `ros2 run tf2_ros static_transform_publisher` process (confirmed via
    # `ros2 node list` showing a random-suffixed node name that changes
    # every restart, e.g. static_transform_publisher_KWiu6a23DUWVwuTe /
    # _a0SdibPLzjdiAama across two checks) — not in /tf_static, not from
    # any tracked launch file, not from the robot's own URDF/xacro sources
    # (confirmed via grep across universal_robot_ros2/). Not safe to depend
    # on structurally until the real camera->marker offset is properly
    # measured (todo.txt B2) and baked into a permanent fixed joint.
    # robotiq_85_base_link is a real, always-present, already-in-the-SRDF-
    # chain link (see real_ur3e_moveit_config/config/name.srdf) — used as
    # an interim, verified-safe end effector for standoff/cal_ready moves
    # until that measurement lands. The marker sits rigidly on/near the
    # gripper, so positioning this link in front of the camera should keep
    # the marker in view too.
    end_effector_frame: "robotiq_85_base_link"
    standoff_m: 0.25
    max_reach_m: 0.5
    facing_rpy_rad: [3.14159265, 0.0, 1.57079633]
    # Used by ~/trace_polygon (calibration-sample spread): num_corners >= 3
    # (3=triangle, 4=square, 5=pentagon, ...), radius_m is each corner's
    # distance from the standoff pose's center in its own local X/Y plane.
    # Keep radius_m small relative to max_reach_m above. PLACEHOLDER — not
    # re-tuned for the real cell yet, see file header.
    polygon_num_corners: 4
    polygon_radius_m: 0.05
    # Default planning strategy for ~/trace_polygon (a plain Trigger, no
    # per-call field). ~/trace_path takes planning_mode explicitly per
    # call instead — see TracePath.srv. "cartesian" = straight-line
    # interpolated path (predictable geometry, can fail partway near
    # limits/obstacles); "joint_space" = free-space planning (more robust,
    # no straight-line guarantee).
    polygon_default_planning_mode: "cartesian"

    # OMPL planning request tuning applied to every plan call (joint-space
    # planAndExecute; planAndExecuteCartesian uses computeCartesianPath
    # instead and ignores these).
    # planning_pipeline_id: DO NOT change from "ompl" — move_group.launch.py
    # deliberately restricts move_group to only load the OMPL pipeline
    # (.planning_pipelines(pipelines=["ompl"])). CHOMP and Pilz are NOT
    # configured (no chomp_planning.yaml / pilz planning yaml exists) and
    # are NOT loaded by move_group; MoveItConfigsBuilder auto-loads CHOMP
    # with a built-in default otherwise, which cannot handle pose-target
    # goals and silently broke planAndExecute() until this was pinned
    # (2026-07-19). Changing this value here alone does nothing useful
    # without also adding that pipeline's yaml and updating
    # move_group.launch.py's pipeline list.
    # planner_id must be one of ur_manipulator's planner_configs entries in
    # real_ur3e_moveit_config/config/ompl_planning.yaml.
    # RRTstarkConfigDefault is an optimizing planner (keeps searching until
    # planning_time_s runs out, minimizing joint-space path length) —
    # previously unconfigured entirely (no ompl_planning.yaml existed for
    # the real robot), which meant MoveIt's compiled-in default
    # (RRTConnect, ~5s, 1 attempt, no optimization) was used — this is the
    # root cause of the real arm taking twisted, unnecessarily long paths
    # and swinging joints close to each other despite no collision being
    # reported (RRTConnect finds A valid path fast, not a good one).
    # num_planning_attempts > 1: MoveGroupInterface automatically keeps the
    # shortest-path plan among the attempts.
    planning_pipeline_id: "ompl"
    planner_id: "RRTstarkConfigDefault"
    planning_time_s: 3.0
    num_planning_attempts: 8

    # Minimum achieved fraction of a straight-line Cartesian path required
    # to execute it at all (planAndExecuteCartesian's min_fraction) — was
    # hardcoded 0.95 until 2026-07-22, made configurable after real-robot
    # testing showed some short Cartesian moves near cal_ready (e.g.
    # auto-centering probe steps) only achieve 50-83%, refused outright at
    # the 0.95 default even though the target itself is reachable via
    # joint-space planning from the same start pose. LOWERING THIS IS A
    # SAFETY TRADEOFF: a lower value means more incomplete straight-line
    # paths get EXECUTED rather than refused — i.e. the arm can stop short
    # of the intended waypoint at an unplanned intermediate pose. Only
    # lower this if that tradeoff has been deliberately accepted; see
    # PlannerConfig::cartesian_min_fraction's doc comment for the same
    # warning.
    cartesian_min_fraction: 0.95

    # If true, TrajectoryPlanner moves to the "home" preset once on startup
    # (see runStartupSequence, called from the constructor) — requires a
    # "home" entry in preset_poses_real.yaml (measured, see that file). Set
    # false to disable without a code change.
    #
    # Re-enabled 2026-07-18 — the false-timeout/mid-motion-cancellation
    # issue is fixed (root cause: move_group.launch.py never actually
    # loaded trajectory_execution.yaml's content at all; fixed via a
    # SetParameter override for allowed_execution_duration_scaling instead
    # — see real_ur3e_moveit_config/launch/move_group.launch.py). Verified
    # via `ros2 param get /move_group
    # trajectory_execution.allowed_execution_duration_scaling` returning
    # 4.0 on a live move_group instance.
    move_to_home_on_startup: true

    # Sequenced-goal stay/lift/standby timing (see ArmState /
    # TracePath.srv's is_sequenced_goal doc comment) — only applies to
    # ~/trace_path calls that explicitly set is_sequenced_goal: true.
    # Every sequenced goal resolves to the SAME two destinations (a lift
    # straight up, then "standby") — it does NOT return to wherever the
    # arm was before the goal.
    # stay_seconds_at_goal: how long to stay AT the goal (e.g. a hole/
    # cupholder pose) before automatically lifting away from it.
    # lift_target_z_m: absolute Z (base_link's own Z; 0.0 = level with
    # base_link's origin) to lift to — NOT an offset added to the goal's
    # Z. X/Y/orientation stay identical to the goal. PLACEHOLDER — not
    # re-verified for the real cell yet, see file header.
    # lift_wait_seconds: how long to then wait at the lifted pose, with no
    # new sequenced goal arriving, before automatically moving to
    # "standby" (requires a "standby" entry in preset_poses_real.yaml,
    # measured).
    stay_seconds_at_goal: 4.0
    lift_target_z_m: 0.0
    lift_wait_seconds: 8.0

    # Global settle delay applied inside tracePath(), after EVERY
    # successful waypoint move — single-waypoint calls (home, cal_ready,
    # sequenced goals) and each corner of a multi-waypoint polygon sweep
    # alike, since they all funnel through tracePath(). Gives the real
    # camera (wall/ceiling-mounted, over the Zenoh bridge — see CLAUDE.md's
    # Real Robot Camera Setup) time to produce a fresh, non-motion-blurred
    # frame after the arm stops moving. 1.0s is a starting point — bump if
    # the real camera pipeline needs longer to catch up; 0.0 disables it.
    # See SequenceConfig::waypoint_settle_seconds.
    waypoint_settle_seconds: 1.0

    # How long to pause after publishing the startup gripper-close command
    # (see TrajectoryPlanner::closeGripperOnStartup) before proceeding to
    # the home move. No completion feedback exists to wait on instead —
    # this is a fixed guess, not a measurement (real's robotiq_85_driver
    # publishes no gripper position/status that could confirm "closed" —
    # confirmed live 2026-07-20, /joint_states reports the same static
    # value for the gripper joints regardless of actual open/closed state).
    gripper_close_settle_seconds: 2.0