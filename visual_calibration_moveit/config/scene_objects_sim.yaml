planning_scene_setup:
  ros__parameters:
    planning_frame: "base_link"

    # Per-object on/off switch — set any of these to false to remove that
    # object from the scene without deleting its config. All default true
    # if omitted.
    coffee_machine.enabled: true
    cupholder.enabled: true
    countertop.enabled: true
    wall.enabled: true
    # Sim's camera is wrist-mounted (rides the arm, part of the URDF) — no
    # PHYSICAL wall-mounted camera housing to guard against, unlike real.
    # This box is kept enabled anyway as a placeholder/visual-reference
    # object (matching real's camera.* entries in shape, per 2026-07-22
    # decision) — not a real collision concern in sim, just parity with
    # real's scene-setup style and a visible reference box. Values below
    # were previously only the planning_scene_setup.cpp hardcoded
    # defaults (silently in effect since this file never overrode them);
    # made explicit here so they're visible/tunable from yaml like every
    # other object, same convention as scene_objects_real.yaml's camera.*.
    camera.enabled: true
    camera.shape_type: "box"
    camera.pose.x: -0.28
    camera.pose.y: -0.4
    camera.pose.z: 0.33
    camera.pose.yaw: 0.0
    camera.box_names: ["body"]
    camera.boxes.body.size: [0.2, 0.2, 0.2]
    camera.boxes.body.local_pose: [0.0, 0.0, 0.0, 0.0]

    coffee_machine.shape_type: "mesh"
    coffee_machine.pose.x: 0.1
    coffee_machine.pose.y: 0.86
    coffee_machine.pose.z: -0.032
    coffee_machine.pose.yaw: 1.57
    coffee_machine.mesh_path: "package://the_construct_office_gazebo/models/coffee_machine/meshes/cafeteria.dae"

    # Switched from mesh to box: the instructor's updated
    # the_construct_office_gazebo package removed the barista_model/
    # directory entirely (was the source of TOP_colour_1.dae), so the old
    # mesh path no longer resolves. Box size is a placeholder matching
    # scene_objects_real.yaml's cupholder box — not yet measured against
    # the new sim world; retune once sim can be launched again (gzserver
    # is currently crashing on startup, unrelated to this package — see
    # resources/docs/aruco_real_tuning_log.md-adjacent notes / todo.txt).
    cupholder.shape_type: "box"
    cupholder.pose.x: -0.26
    cupholder.pose.y: 0.04
    cupholder.pose.z: -0.900
    cupholder.pose.yaw: 1.57
    cupholder.box_names: ["body"]
    cupholder.boxes.body.size: [0.5, 0.5, 0.5]
    cupholder.boxes.body.local_pose: [0.0, 0.0, 0.0, 0.0]

    # Countertop = starbots_bartender_dispenser, modeled in Gazebo as two
    # stacked box primitives (body + thin top slab), not a mesh.
    countertop.shape_type: "box"
    countertop.pose.x: 0.3
    countertop.pose.y: 0.36
    countertop.pose.z: -0.532
    countertop.pose.yaw: 0.0

    countertop.box_names: ["body", "top"]
    countertop.boxes.body.size: [0.5, 1.8, 1.0]
    countertop.boxes.body.local_pose: [0.0, 0.0, 0.0, 0.0]

    countertop.boxes.top.size: [0.85, 1.81, 0.05]
    countertop.boxes.top.local_pose: [0.0, 0.0, 0.5, 0.0]

    # Wall — single box primitive, see the_construct_office_gazebo/models/wall/model.sdf
    wall.shape_type: "box"
    wall.pose.x: 0.3
    wall.pose.y: -0.56
    wall.pose.z: -0.032
    wall.pose.yaw: 0.0

    wall.box_names: ["body"]
    wall.boxes.body.size: [2.0, 0.03, 2.0]
    wall.boxes.body.local_pose: [0.0, 0.0, 0.0, 0.0]
