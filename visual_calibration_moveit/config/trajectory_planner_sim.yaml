# standoff_m is a starting point, not a precise derivation — the camera
# (wrist_rgbd_camera_link) sits ~0.43m from base_link already, close to the
# UR3e's ~0.5m datasheet max_reach_m, so straight-line distance alone
# doesn't guarantee reachability (that also depends on orientation and
# joint limits). Tune standoff_m against what actually plans in this scene.
# Working value found empirically: 0.25 (see error-mitigation.md #11).
#
# facing_rpy_rad (roll, pitch, yaw, radians — same convention as
# scene_objects_sim.yaml's pose.yaw) is applied in the camera frame's own
# local axes to compute the goal orientation for end_effector_frame. The
# value below (pi, 0, pi/2) is equivalent to the quaternion
# (0.7071, 0.7071, 0, 0): it swaps the goal's X/Y axes with the camera's
# and flips Z, so end_effector_frame's Z ends up facing back toward the
# camera's Z — verified numerically (see error-mitigation.md #13).
trajectory_planner:
  ros__parameters:
    camera_frame: "wrist_rgbd_camera_depth_optical_frame"
    end_effector_frame: "rg2_gripper_aruco_link"
    standoff_m: 0.25
    max_reach_m: 0.5
    facing_rpy_rad: [3.14159265, 0.0, 1.57079633]
    
    # Used by ~/trace_polygon (calibration-sample spread): num_corners >= 3
    # (3=triangle, 4=square, 5=pentagon, ...), radius_m is each corner's
    # distance from the standoff pose's center in its own local X/Y plane.
    # Keep radius_m small relative to max_reach_m above.
    polygon_num_corners: 4
    polygon_radius_m: 0.05
    # Default planning strategy for ~/trace_polygon (a plain Trigger, no
    # per-call field). ~/trace_path takes planning_mode explicitly per
    # call instead — see TracePath.srv. "cartesian" = straight-line
    # interpolated path (predictable geometry, can fail partway near
    # limits/obstacles); "joint_space" = free-space planning (more robust,
    # no straight-line guarantee).
    polygon_default_planning_mode: "cartesian"

    # If true, TrajectoryPlanner moves to the "home" preset once on startup
    # (see runStartupSequence, called from the constructor) — requires a
    # "home" entry in preset_poses_sim.yaml. Set false to disable without a
    # code change.
    move_to_home_on_startup: true

    # Sequenced-goal stay/lift/standby timing (see ArmState /
    # TracePath.srv's is_sequenced_goal doc comment) — only applies to
    # ~/trace_path calls that explicitly set is_sequenced_goal: true.
    # Every sequenced goal resolves to the SAME two destinations (a lift
    # straight up, then "standby") — it does NOT return to wherever the
    # arm was before the goal.
    # stay_seconds_at_goal: how long to stay AT the goal (e.g. a hole/
    # cupholder pose) before automatically lifting away from it.
    # lift_target_z_m: absolute Z (base_link's own Z; 0.0 = level with
    # base_link's origin) to lift to — NOT an offset added to the goal's
    # Z. X/Y/orientation stay identical to the goal.
    # lift_wait_seconds: how long to then wait at the lifted pose, with no
    # new sequenced goal arriving, before automatically moving to
    # "standby" (requires a "standby" entry in preset_poses_sim.yaml).
    stay_seconds_at_goal: 4.0
    lift_target_z_m: 0.0
    lift_wait_seconds: 8.0