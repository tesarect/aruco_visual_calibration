# Real: cal_ready now resolves via trajectory_planner's verified
# cal_ready.joint_values preset (see preset_poses_real.yaml) rather than
# the standoff/TF fallback. auto_center_enabled defaults to false here —
# matching sim, and matching the web app's own UI default (its toggle is
# local React state that starts false and is never read back from this
# node's live parameter on page load, so a true node-side default here
# would silently diverge from what the UI displays unless the user
# explicitly re-toggles it every session — see useCalibrationAction.ts).
# Still available as a runtime override via set_parameters/the web toggle
# if the camera FOV near cal_ready ever needs this safety net again.
calibration_orchestrator_node:
  ros__parameters:
    # Extra pause after reaching cal_ready, on top of trajectory_planner's
    # own per-waypoint waypoint_settle_seconds (already applied inside the
    # ~/trace_path call this node makes) — real's camera pipeline (Zenoh
    # bridge, see CLAUDE.md's Real Robot Camera Setup) may need longer than
    # sim to settle before starting a multi-minute calibration run.
    post_cal_ready_settle_seconds: 3.0

    # Master switch for the auto-centering safety step (see
    # calibration_orchestrator_node.hpp's runAutoCenterProbe doc comment).
    # Overridable at runtime via set_parameters — the web app can flip this
    # without a restart. Defaults false (2026-07-21 — was true) now that
    # cal_ready is well-tuned (verified joint-value preset, see header
    # comment above) and to match the web UI's own default. Flip back to
    # true here (or via the web toggle) if the polygon sweep is later found
    # to clip outside the real camera's FOV.
    auto_center_enabled: false
    # Distance (m) moved per probe step, in cal_ready's own local X/Y
    # plane, when searching for each of the four +X/-X/+Y/-Y visibility
    # boundaries. PLACEHOLDER — not re-tuned for the real cell yet.
    auto_center_probe_step_m: 0.05
    # Maximum probe distance (m) from cal_ready along any single direction
    # before giving up on that direction. Bumped 0.15 -> 0.30 (2026-07-22)
    # after a live real-robot test showed the +X direction still visible
    # at the old 0.15m cap — that cap was cutting the search short before
    # the true camera-FOV/reachability boundary in at least one direction.
    # Still a PLACEHOLDER — not fully re-tuned for the real cell.
    auto_center_max_probe_m: 0.30
    # How long to wait for a marker_pose message after each probe move
    # before concluding the marker is not visible there — real's detection
    # pipeline may be slower than sim's, so this is longer than
    # calibration_orchestrator_sim.yaml's value.
    auto_center_visibility_timeout_sec: 3.0

    # Planning strategy for every ~/trace_path call this node makes
    # (cal_ready's TF-based fallback move + every auto-center probe/
    # recenter move) — "cartesian" or "joint_space", see TracePath.srv.
    # Changed joint_space -> cartesian (2026-07-22, live-tested working on
    # real) per explicit requirement: every move from cal_ready onward
    # during calibration (auto-centering, the polygon sweep, and any
    # future random-pose sampling) should be cartesian, matching
    # calibration_broadcaster_real.yaml's polygon-sweep planning_mode.
    # Does NOT affect the joint-value-preset path to cal_ready itself
    # (a separate ~/move_to_preset call that never goes through this
    # node's tracePathBlocking() helper, so it stays joint-space
    # regardless of this setting) — only this node's OWN moves
    # (auto-center probes/recenter, and the TF-based cal_ready fallback
    # used only when no joint-value preset is configured).
    planning_mode: "cartesian"

    # --- Image-based centering (2026-07-23) ---
    # Replaces the auto_center_probe_step_m/auto_center_max_probe_m/
    # auto_center_visibility_timeout_sec params above for the ACTIVE
    # centering path (kept above, unused, in case of a fallback need) — see
    # calibration_orchestrator_node.hpp's centerOnMarkerUsingImage doc
    # comment. No camera intrinsics/depth/TF dependency at all — uncalibrated
    # Image-Based Visual Servoing (IBVS) via an estimated 2x2 image Jacobian
    # (2026-07-23 — replaces two earlier per-axis designs; see
    # calibration_orchestrator_sim.yaml's matching comment for the live
    # failure that motivated this), so (unlike the pinhole-projection
    # design this replaced) it should behave the same on real as in sim,
    # without needing D415-specific intrinsics/depth accuracy
    # considerations.
    # Bumped 0.05 -> 0.10 (2026-07-23, per the sim live test that found
    # 0.05m too small to produce a trustworthy pixel-response signal), then
    # lowered 0.10 -> 0.06 (2026-07-24, live real testing — 0.10m travel
    # risked the arm approaching the wall at this cal_ready position).
    # Still a PLACEHOLDER for real — may need its own tuning once tested
    # against the D415's actual resolution/working distance.
    centering_step_m: 0.06
    # An axis is considered centered once the marker's pixel centroid is
    # within this many pixels of the image's own center along that axis
    # (checked on both image axes simultaneously). PLACEHOLDER — not yet
    # tuned against the D415's actual resolution.
    centering_pixel_tolerance: 15.0
    # Minimum |pixel response| (Euclidean norm) each of the 2 bootstrap
    # probes must produce before its Jacobian column is trusted — below
    # this, the bootstrap fails outright rather than being retried.
    # Deliberately conservative — real low-light/lower-resolution
    # detection may be noisier than sim.
    centering_min_jacobian_column_px_per_m: 20.0
    # Safety bound: max total moves (2 bootstrap probes + correction
    # jumps) before giving up. No longer "per axis" — both image axes are
    # corrected together in each jump.
    centering_max_iterations: 6
    # How long to wait for a fresh Detection2D (aruco_marker) after each
    # centering step before concluding the marker isn't visible there —
    # real's detection pipeline may be slower than sim's, matching
    # auto_center_visibility_timeout_sec's own real-vs-sim reasoning above.
    centering_visibility_timeout_sec: 3.0
    # Safety cap (meters) on any single Jacobian-computed jump — protects
    # against a near-singular J producing a wild estimated distance.
    # Matches auto_center_max_probe_m above in spirit/value but is a
    # SEPARATE parameter (that one belongs to the superseded
    # runAutoCenterProbe path) — see this field's own doc comment in
    # calibration_orchestrator_node.hpp.
    centering_max_jump_m: 0.30
    # Read ONCE at startup purely to learn the image's own pixel
    # width/height (for the image's center point) — must match
    # aruco_detector_real.yaml's camera_info_topic.
    camera_info_topic: "/D415/color/camera_info"