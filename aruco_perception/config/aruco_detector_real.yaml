# Real robot topics (D415 over Zenoh — see CLAUDE.md's Real Robot Camera
# Setup section) and detection tuning.
#
# Tuning below comes from a grid sweep of cv::aruco::DetectorParameters
# against 25 real captures (captures/*.png, the 4 bursts that actually show
# the gripper+marker in frame — see
# resources/docs/aruco_real_tuning_log.md for the full methodology,
# including why 35 of the 60 captures were excluded as marker-less).
#
# Baseline (sim's params, unchanged) scored 21/25 (84%) on this same set.
# adaptive_thresh_constant: 7.0 -> 3.0 was the one change that mattered —
# it alone reached 25/25 (100%). Every other knob tested had no measurable
# effect in this range, so they're left at sim's values to minimize
# unnecessary drift from a known-working baseline.
aruco_detector_node:
  ros__parameters:
    image_topic: "/D415/color/image_raw"
    camera_info_topic: "/D415/color/camera_info"
    pose_topic: "/aruco_perception/marker_pose"

    # classical/hybrid switch: true = this node is the active marker-pose
    # publisher on startup (classical is the default detector). Flipped
    # live by calibration_orchestrator_node via set_parameters, never
    # requires a restart — see aruco_detector_node.hpp's class doc comment.
    active: true

    # Overlay — published every frame regardless of marker detection
    # (2026-07-23: plain camera frame when the marker isn't found, marker
    # box+axes drawn when it is — see aruco_detector_node.hpp's class doc
    # comment for why this changed from "only published on detection").
    publish_overlay_image: true
    overlay_image_topic: "/aruco_perception/overlay_image"
    overlay_border_color_bgr: [0, 255, 255]

    # Same topic yolo_marker_bridge_node.py already publishes cup_holder/
    # hole Detection2DArray on — this node adds the ArUco marker's own
    # pixel centroid/bbox (class_name "aruco_marker") to the same stream.
    detections_2d_topic: "/aruco_perception/detections_2d"

    # Live-toggled by calibration_orchestrator_node (set_parameters, no
    # restart) for the duration of its image-based centering routine —
    # draws a crosshair at the image's pixel center in the overlay stream
    # while true. Default false: no crosshair outside of active centering.
    show_centering_crosshair: false

    # Known / Given
    marker_length_m: 0.045
    dictionary_name: "DICT_4X4_50"

    marker_id: 0
    adaptive_thresh_win_size_min: 3
    adaptive_thresh_win_size_max: 23
    adaptive_thresh_win_size_step: 4
    adaptive_thresh_constant: 3.0
    min_marker_perimeter_rate: 0.03
    corner_refinement_method: 1