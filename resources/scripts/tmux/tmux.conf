# Change prefix from Ctrl+b to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Sync tmux buffer to the browser's clipboard via OSC 52 (works in
# browser-based/rosject terminals where there's no real X11 display for
# xclip to reach — OSC 52 asks the terminal emulator itself to set the
# clipboard, which xterm.js-based web terminals support directly).
# set-clipboard on makes tmux itself emit OSC 52 whenever the copy buffer
# changes; copy-pipe below still runs xclip too, best-effort, for setups
# that do have a real X11 display.
set -g set-clipboard on
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i 2>/dev/null"

# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1
set -g pane-base-index 1

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Split panes
bind | split-window -h
bind - split-window -v

# Easier pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vi mode
setw -g mode-keys vi

# Larger scrollback history
set -g history-limit 100000

# Allow true colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*:Tc"

