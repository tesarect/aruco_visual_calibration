# Change prefix from Ctrl+b to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1
set -g pane-base-index 1

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Split panes
bind | split-window -h
bind - split-window -v

# Easier pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vi mode
setw -g mode-keys vi

# Larger scrollback history
set -g history-limit 100000

# Allow true colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*:Tc"

# Display pane title on individual border
# tmux set-option -t "$SESSION" pane-border-status top
# tmux set-option -t "$SESSION" pane-border-format "#{?pane_active,#[fg=green]▶ #[default],}#{pane_title}"

# Display pane title on the status bar - right side
tmux set-option -t "$SESSION" status-left "#[fg=cyan]#S #[default]| #[fg=yellow]#W"
tmux set-option -t "$SESSION" status-right "#[fg=green]Pane: #{pane_title}"